name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: "-D warnings"
  RUSTDOCFLAGS: "-D warnings"
  CARGO_TERM_COLOR: always

jobs:
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - name: 🛡️ Harden runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit
          disable-sudo: true
      - name: 🚚 Check out the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: 🏗️ Set up Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
          components: clippy
      - name: ⚡️ Cache Rust artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: 🧪 Run Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  doc:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - name: 🛡️ Harden runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit
          disable-sudo: true
      - name: 🚚 Check out the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: 🏗️ Set up Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
      - name: ⚡️ Cache Rust artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: 📝 Build documentation
        run: cargo doc --workspace --no-deps
      - name: 🧪 Run doctests
        run: cargo test --doc --workspace

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: 🛡️ Harden runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit
          disable-sudo: true
      - name: 🚚 Check out the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: 🏗️ Set up Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
      - name: ⚡️ Cache Rust artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: 📦️ Install cargo-nextest
        uses: taiki-e/install-action@b8be7f5e140177087325943c4a8e169d01c59b3d # v2
        with:
          tool: cargo-nextest
      - name: 🧪 Run tests
        run: cargo nextest run --workspace

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - name: 🛡️ Harden runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit
          disable-sudo: true
      - name: 🚚 Check out the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: 🏗️ Set up Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
          components: llvm-tools-preview
      - name: ⚡️ Cache Rust artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: 📦️ Install coverage tools
        uses: taiki-e/install-action@b8be7f5e140177087325943c4a8e169d01c59b3d # v2
        with:
          tool: cargo-llvm-cov,cargo-nextest
      - name: 🧪 Generate coverage report
        run: cargo llvm-cov nextest --workspace --lcov --output-path lcov.info
      - name: ☂️ Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6
        with:
          fail_ci_if_error: true
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}

  deny:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - name: 🛡️ Harden runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit
          disable-sudo: true
      - name: 🚚 Check out the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: 🧪 Run cargo-deny
        uses: EmbarkStudios/cargo-deny-action@3fd3802e88374d3fe9159b834c7714ec57d6c979 # v2

  vet:
    name: Supply chain audit
    runs-on: ubuntu-latest
    steps:
      - name: 🛡️ Harden runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit
          disable-sudo: true
      - name: 🚚 Check out the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: 🏗️ Set up Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
      - name: 📦️ Install cargo-vet
        uses: taiki-e/install-action@b8be7f5e140177087325943c4a8e169d01c59b3d # v2
        with:
          tool: cargo-vet
      - name: 🧪 Run cargo-vet
        run: cargo vet

  semver:
    name: Semver check
    runs-on: ubuntu-latest
    steps:
      - name: 🛡️ Harden runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit
          disable-sudo: true
      - name: 🚚 Check out the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: 🏗️ Set up Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
      - name: ⚡️ Cache Rust artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: 📦️ Install cargo-semver-checks
        uses: taiki-e/install-action@b8be7f5e140177087325943c4a8e169d01c59b3d # v2
        with:
          tool: cargo-semver-checks
      - name: 🧪 Run semver checks
        run: cargo semver-checks -p evfmt

  machete:
    name: Unused dependencies
    runs-on: ubuntu-latest
    steps:
      - name: 🛡️ Harden runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit
          disable-sudo: true
      - name: 🚚 Check out the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: 🏗️ Set up Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
      - name: 📦️ Install cargo-machete
        uses: taiki-e/install-action@b8be7f5e140177087325943c4a8e169d01c59b3d # v2
        with:
          tool: cargo-machete
      - name: 🧪 Run cargo-machete
        run: cargo machete

  msrv:
    name: MSRV
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: "" # don't promote warnings to errors on older toolchains
    steps:
      - name: 🛡️ Harden runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit
          disable-sudo: true
      - name: 🚚 Check out the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: 🏗️ Set up bootstrap Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
      - name: 🔎 Detect the MSRV
        id: msrv
        shell: bash
        run: |
          # Read the effective rust-version from Cargo metadata so CI stays in sync
          # with the manifest instead of duplicating the MSRV here.
          version="$(
            cargo metadata \
              --format-version 1 \
              --no-deps \
              --manifest-path evfmt/Cargo.toml \
            | jq -r '.packages[0].rust_version'
          )"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
      - name: 🏗️ Set up the MSRV toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: ${{ steps.msrv.outputs.version }}
      - name: ⚡️ Cache Rust artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: 🧪 Run cargo check
        run: cargo check --workspace
      - name: 🧪 Run cargo test
        run: cargo test --workspace
