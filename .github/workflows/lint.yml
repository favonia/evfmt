name: Lint

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  rustfmt:
    name: Rust formatting
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Check out the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: 🏗️ Set up Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
          components: rustfmt
      - name: ⚡️ Cache Rust artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: 🧪 Run rustfmt
        run: cargo fmt --check

  toml:
    name: TOML
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Check out the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: 🏗️ Set up Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
      - name: 📦️ Install TOML tools
        uses: taiki-e/install-action@b8be7f5e140177087325943c4a8e169d01c59b3d # v2
        with:
          tool: taplo-cli,cargo-sort
      - name: 🧪 Run Taplo
        run: taplo fmt --check
      - name: 🧪 Run cargo-sort
        run: cargo sort --check --workspace

  evfmt:
    name: evfmt formatting
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Check out the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: 🏗️ Set up Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
      - name: ⚡️ Cache Rust artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: 🧪 Run evfmt
        run: cargo run -p evfmt -- check .

  typos:
    name: Typos
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Check out the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: 🧪 Run typos
        uses: crate-ci/typos@02ea592e44b3a53c302f697cddca7641cd051c3d # v1.45.0

  actionlint:
    name: GitHub Actions
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: 🛡️ Harden runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit
          disable-sudo: true
          policy: go-tooling

      - name: 🚚 Check out the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: 🏗️ Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.2"
      - name: 📡 Run `go telemetry on`
        run: |
          go telemetry on
      - name: 🔎 Check shellcheck availability
        run: |
          command -v shellcheck
      - name: 🧪 Run actionlint
        run: |
          go install "github.com/rhysd/actionlint/cmd/actionlint@${ACTIONLINT_VERSION}"
          actionlint -shellcheck shellcheck
        env:
          # renovate: datasource=go depName=github.com/rhysd/actionlint versioning=semver
          ACTIONLINT_VERSION: v1.7.12
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  yamlfmt:
    name: YAML
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: 🛡️ Harden runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit
          disable-sudo: true
          policy: go-tooling

      - name: 🚚 Check out the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: 🏗️ Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.2"
      - name: 📡 Run `go telemetry on`
        run: |
          go telemetry on
      - name: 🧪 Run yamlfmt
        run: |
          go install "github.com/google/yamlfmt/cmd/yamlfmt@${YAMLFMT_VERSION}"
          yamlfmt .
        env:
          # renovate: datasource=go depName=github.com/google/yamlfmt versioning=semver
          YAMLFMT_VERSION: v0.21.0

  mdformat:
    name: Markdown
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: 🛡️ Harden runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit
          disable-sudo: true
          policy: python-tooling

      - name: 🚚 Check out the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: 🏗️ Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: .github/workflows/mdformat-requirements.txt
      - name: 📦️ Install mdformat
        run: python -m pip install --require-hashes --requirement .github/workflows/mdformat-requirements.txt
      - name: 🧪 Run mdformat
        run: git ls-files -z '*.md' '*.markdown' | xargs -0r python -m mdformat --check
